<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solar System • Three.js</title>
    <link rel="icon" href="./images/favicon1.ico" />
    <link rel="stylesheet" href="./solar_system.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
      <div class="top-right-ui">
        <div id="dateBadge" class="date-badge"></div>
      </div>

      <aside class="left-drawer" aria-label="Simulation controls">
        <h1>Solar System</h1>

        <label class="control">
          <span>Simulation Date</span>
          <input id="dateInput" type="date" />
        </label>

        <label class="control">
          <span>Speed (days / second)</span>
          <input
            id="speed"
            type="range"
            min="0"
            max="20"
            step="0.1"
            value="1"
          />
          <!--  <input
            id="speed"
            type="range"
            min="0.01"
            max="30"
            value="0.1"
            step="1"
          /> -->
          <output id="speedOut">60</output>
        </label>

        <label class="control inline">
          <input id="pause" type="checkbox" />
          <span>Pause simulation</span>
        </label>

        <label class="control inline">
          <input id="toggleOrbits" type="checkbox" checked />
          <span>Show orbit rings</span>
        </label>

        <label class="control inline">
          <input id="toggleLabels" type="checkbox" checked />
          <span>Show labels</span>
        </label>
        <label class="control">
          <select id="lightMode">
            <option value="normal">Normal</option>
            <option value="boost">Boost</option>
            <option value="cinematic">Cinematic</option>
          </select></label
        >

        <p class="hint">Drag to orbit the camera, scroll to zoom.</p>
      </aside>
      // The planet info drawer is initially empty and hidden. It will be
      populated and shown when a planet is selected.
      <aside id="planetInfoDrawer" class="planet-info-drawer is-empty">
        <div class="planet-info-handle">
          <span>Planet Info</span>
        </div>

        <div class="planet-info-card">
          <div class="planet-info-header">
            <p class="planet-info-kicker">Selected object</p>
            <h2 id="planetInfoName" class="planet-info-title">No selection</h2>
            <p id="planetInfoType" class="planet-info-subtitle">
              Select a planet to view information
            </p>
          </div>

          <div id="planetInfoBody" class="planet-info-body">
            <div class="planet-info-empty">
              Select a planet to view information
            </div>
          </div>
        </div>
      </aside>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
        }
      }
    </script>

    <script type="module" src="./solar_system.js"></script>
  </body>
</html>
